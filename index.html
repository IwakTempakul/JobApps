<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Generator Surat Lamaran</title>
<style>
  body { background: #f0e9dd; font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
.container { width: 100%; max-width: 750px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); padding: 30px; position: relative; padding-bottom: 70px; }
.container::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; background-image: url('Logo.png'); background-repeat: no-repeat; background-size: contain; background-position: center; opacity: 0.08; z-index: 0; }
.slide { display: none; position: relative; z-index: 1; }
.slide.active { display: block; }
h2 { text-align: center; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
label { font-weight: 600; display: block; margin-bottom: 6px; }
input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; font-size: 15px; box-sizing: border-box; background: rgba(255,255,255,0.5); }
.toolbar { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; background: #eee; padding: 8px; border-radius: 8px; flex-wrap: wrap; }
.toolbar button { padding: 8px 12px; font-size: 13px; background: #4a90e2; color: white; border: none; border-radius: 6px; cursor: pointer; }
.paper-canvas { width: 100%; overflow: hidden; background: #ddd; border-radius: 8px; height: 600px; position: relative; cursor: grab; touch-action: none; }
.paper-canvas.grabbing { cursor: grabbing; }
.paper { width: 750px; height: 1056px; position: absolute; top: 0; left: 0; background: #fefcf3; background-image: repeating-linear-gradient(#cce0ff 0px, #cce0ff 1px, transparent 1px, transparent 28px); padding: 50px 60px; line-height: 28px; font-size: 15px; color: #111; text-align: justify; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
.title { text-align: center; font-weight: 700; font-size: 18px; margin-bottom: 24px; text-transform: uppercase; line-height: 1.5; }
.section { margin-bottom: 18px; }
.signature-space { margin-bottom: 56px; }
.btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
.main-btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-next { background: #4a90e2; color: white; }
.btn-back { background: #ccc; color: #333; }
.btn-print { background: #27ae60; color: white; }
.ribbon { position: absolute; bottom: 0; left: 0; width: 100%; background: #000; color: #fff; text-align: center; padding: 12px 0; font-weight: 700; font-size: 14px; letter-spacing: 1px; border-radius: 0 0 12px 12px; z-index: 2; }
@media print {
.toolbar { display: none; }
body { background: white; padding: 0; }
.container { box-shadow: none; max-width: 100%; padding: 0; }
.paper-canvas { background: white; height: auto; overflow: visible; }
.paper { position: static; width: 100%; height: auto; box-shadow: none; transform: none!important; }
}
</style>
</head>
<body>

<div class="container">
  <div class="slide active" id="slide1">
    <h2>Isi Data Surat Lamaran</h2>
    <div class="form-group"><label>1. Siapa Nama Lengkapmu?</label><input type="text" id="nama"></div>
    <div class="form-group"><label>2. Apa Alamat Lengkapmu?</label><input type="text" id="alamat"></div>
    <div class="form-group"><label>3. Tanggal berapa surat ini dibuat?</label><input type="date" id="tanggal"></div>
    <div class="form-group"><label>4. Siapa Nama HRD / Penerima Surat?</label><input type="text" id="hrd"></div>
    <div class="form-group"><label>5. Nama Perusahaannya?</label><input type="text" id="perusahaan"></div>
    <div class="form-group"><label>6. Alamat Perusahaan?</label><input type="text" id="alamatPerusahaan"></div>
    <div class="form-group"><label>7. Posisi apa yang kamu lamar?</label><input type="text" id="posisi"></div>
    <div class="form-group"><label>8. Jurusan apa yang kamu ambil di sekolah?</label><input type="text" id="jurusan"></div>
    <div class="btn-group"><div></div><button class="main-btn btn-next" onclick="nextSlide()">Next →</button></div>
  </div>

  <div class="slide" id="slide2">
    <div class="toolbar">
      <button onclick="zoomOut()">- 50%</button>
      <button onclick="zoomReset()">100%</button>
      <button onclick="zoomIn()">+ Zoom</button>
      <button onclick="rotatePaper()">🔄 Putar</button>
    </div>
    <div class="paper-canvas" id="canvas">
      <div class="paper" id="hasilSurat"></div>
    </div>
    <div class="btn-group">
      <button class="main-btn btn-back" onclick="backSlide()">← Kembali</button>
      <button class="main-btn btn-print" onclick="window.print()">Print / Simpan PDF</button>
    </div>
  </div>
  <div class="ribbon">SMK NEGERI 6 SAMARINDA</div>
</div>

<script>
  let currentScale = 1;
  let currentRotate = 0;
  let posX = 0, posY = 0;
  let isDragging = false;
  let startX, startY;
  const paper = document.getElementById('hasilSurat');
  const canvas = document.getElementById('canvas');

  function updatePaper() {
    const cw = canvas.clientWidth;
    const ch = canvas.clientHeight;
    const isRotated = currentRotate % 180!== 0;

    // ukuran kertas setelah di scale
    const pw = 750 * currentScale;
    const ph = 1056 * currentScale;
    const w = isRotated? ph : pw;
    const h = isRotated? pw : ph;

    if(isRotated){
      // KALAU ROTATE: ACUAN TENGAH + ORIGIN TENGAH
      paper.style.transformOrigin = 'center center';
      posX = cw/2 - w/2; // center horizontal
      posY = ch/2 - h/2; // center vertikal
    } else {
      // KALAU NORMAL: ACUAN KIRI ATAS + ORIGIN KIRI ATAS
      paper.style.transformOrigin = '0 0';
      posX = (cw - pw) / 2; // center horizontal aja
      posY = 0; // tempel atas
    }

    paper.style.transform = `translate(${posX}px, ${posY}px) scale(${currentScale}) rotate(${currentRotate}deg)`;
  }

  function zoomIn() { if(currentScale < 2) { currentScale += 0.1; updatePaper(); } }
  function zoomOut() { if(currentScale > 0.5) { currentScale -= 0.1; updatePaper(); } }
  function zoomReset() { currentScale = 1; currentRotate = 0; updatePaper(); }
  function rotatePaper() { currentRotate = (currentRotate + 90) % 360; updatePaper(); }

  // PANNING
  canvas.addEventListener('mousedown', e => { isDragging = true; canvas.classList.add('grabbing'); startX = e.clientX - posX; startY = e.clientY - posY; });
  window.addEventListener('mousemove', e => { if(!isDragging) return; posX = e.clientX - startX; posY = e.clientY - startY; paper.style.transform = `translate(${posX}px, ${posY}px) scale(${currentScale}) rotate(${currentRotate}deg)`; });
  window.addEventListener('mouseup', () => { isDragging = false; canvas.classList.remove('grabbing'); });
  canvas.addEventListener('touchstart', e => { isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; });
  canvas.addEventListener('touchmove', e => { if(!isDragging) return; posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; paper.style.transform = `translate(${posX}px, ${posY}px) scale(${currentScale}) rotate(${currentRotate}deg)`; });
  canvas.addEventListener('touchend', () => { isDragging = false; });

  let lastDist = 0;
  canvas.addEventListener('touchmove', e => { if(e.touches.length === 2) { const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); if(lastDist!== 0) { if(dist > lastDist && currentScale < 2) currentScale += 0.01; if(dist < lastDist && currentScale > 0.5) currentScale -= 0.01; updatePaper(); } lastDist = dist; } });
  canvas.addEventListener('touchend', () => { lastDist = 0; });

  function nextSlide() {
    const data = {
      nama: document.getElementById('nama').value || '[Your Full Name]',
      alamat: document.getElementById('alamat').value || '[Your Address]',
      tanggal: document.getElementById('tanggal').value || '[Date]',
      hrd: document.getElementById('hrd').value || '[Hiring Manager\'s Full Name]',
      perusahaan: document.getElementById('perusahaan').value || '[Company Name]',
      alamatPerusahaan: document.getElementById('alamatPerusahaan').value || '[Company Address]',
      posisi: document.getElementById('posisi').value || '[Job Title]',
      jurusan: document.getElementById('jurusan').value || '[Your Field]'
    };
    if(data.tanggal!== '[Date]') { const tgl = new Date(data.tanggal); data.tanggal = tgl.toLocaleDateString('en-US', {day: 'numeric', month: 'long', year: 'numeric'}); }
    paper.innerHTML = `
      <div class="title">Job Application Letter for No <br> Experience (Fresh Graduate)</div>
      <div class="section">${data.nama}<br>${data.alamat}<br>${data.tanggal}</div>
      <div class="section">${data.hrd}<br>${data.perusahaan}<br>${data.alamatPerusahaan}</div>
      <div class="section">Dear ${data.hrd},</div>
      <div class="section">I am writing to express my interest in the ${data.posisi} position at ${data.perusahaan}. As a recent graduate in ${data.jurusan}, I am eager to apply my academic knowledge and skills in a professional environment.</div>
      <div class="section">During my studies, I developed strong communication skills, teamwork abilities, and a willingness to learn through coursework and projects.</div>
      <div class="section">I am highly motivated to grow, learn, and contribute positively to your organization.</div>
      <div class="section signature-space">Sincerely,</div>
      <div class="section">${data.nama}</div>
    `;
    document.getElementById('slide1').classList.remove('active');
    document.getElementById('slide2').classList.add('active');
    zoomReset();
  }
  function backSlide() { document.getElementById('slide2').classList.remove('active'); document.getElementById('slide1').classList.add('active'); }
</script>
</body>
</html>
