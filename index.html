<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Surat Lamaran</title>
<style>
  body {
    background: #f0e9dd;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
.container {
    width: 750px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    padding: 30px;
    position: relative;
    padding-bottom: 70px;
    overflow: hidden;
  }

.container::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    background-image: url('Logo.png');
    background-repeat: no-repeat;
    background-size: contain;
    background-position: center;
    opacity: 0.08;
    z-index: 0;
  }
.slide { display: none; position: relative; z-index: 1; }
.slide.active { display: block; }

  h2 { text-align: center; margin-bottom: 20px; font-family: Arial, sans-serif; }
.form-group { margin-bottom: 16px; }
  label { font-weight: 600; display: block; margin-bottom: 6px; font-family: Arial, sans-serif; }
  input {
    width: 100%;
    padding: 10px;
    border: 2px solid #ddd;
    border-radius: 6px;
    font-size: 15px;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(2px);
  }
  input:focus {
    border-color: #4a90e2;
    outline: none;
    background: rgba(255,255,255,0.8);
  }

.paper {
    background: #fefcf3;
    background-image: repeating-linear-gradient(#cce0ff 0px, #cce0ff 1px, transparent 1px, transparent 28px);
    padding: 50px 60px;
    line-height: 28px;
    font-size: 15px;
    color: #111;
    text-align: justify;
    font-family: Arial, sans-serif;
  }
.title {
    text-align: center;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 24px;
    text-transform: uppercase;
    line-height: 1.5;
  }
.section { margin-bottom: 18px; }
.signature-space { margin-bottom: 56px; }

.btn-group {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
  }
  button {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: Arial, sans-serif;
  }
.btn-next { background: #4a90e2; color: white; }
.btn-back { background: #ccc; color: #333; }
.btn-print { background: #27ae60; color: white; }

.ribbon {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #000;
    color: #fff;
    text-align: center;
    padding: 12px 0;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    border-radius: 0 0 12px 12px;
    z-index: 2;
  }
</style>
</head>
<body>

<div class="container">

  <!-- SLIDE 1: INPUT DATA -->
  <div class="slide active" id="slide1">
    <h2>Isi Data Surat Lamaran</h2>
    <div class="form-group">
      <label>1. Siapa Nama Lengkapmu?</label>
      <input type="text" id="nama" placeholder="Contoh: Budi Santoso">
    </div>
    <div class="form-group">
      <label>2. Apa Alamat Lengkapmu?</label>
      <input type="text" id="alamat" placeholder="Contoh: Jl. Merdeka No. 10, Samarinda">
    </div>
    <div class="form-group">
      <label>3. Tanggal berapa surat ini dibuat?</label>
      <input type="date" id="tanggal">
    </div>
    <div class="form-group">
      <label>4. Siapa Nama HRD / Penerima Surat?</label>
      <input type="text" id="hrd" placeholder="Contoh: Mr. John Doe">
    </div>
    <div class="form-group">
      <label>5. Nama Perusahaannya?</label>
      <input type="text" id="perusahaan" placeholder="Contoh: PT Maju Jaya">
    </div>
    <div class="form-group">
      <label>6. Alamat Perusahaan?</label>
      <input type="text" id="alamatPerusahaan" placeholder="Contoh: Jl. Gatot Subroto No. 5, Jakarta">
    </div>
    <div class="form-group">
      <label>7. Posisi apa yang kamu lamar?</label>
      <input type="text" id="posisi" placeholder="Contoh: Staff Admin">
    </div>
    <div class="form-group">
      <label>8. Jurusan apa yang kamu ambil di sekolah?</label> <!-- UDAH DIGANTI -->
      <input type="text" id="jurusan" placeholder="Contoh: TKJ / RPL / DKV / OTKP">
    </div>

    <div class="btn-group">
      <div></div>
      <button class="btn-next" onclick="nextSlide()">Next →</button>
    </div>
  </div>

  <!-- SLIDE 2: HASIL SURAT -->
  <div class="slide" id="slide2">
    <div class="paper" id="hasilSurat"></div>
    <div class="btn-group">
      <button class="btn-back" onclick="backSlide()">← Kembali</button>
      <button class="btn-print" onclick="window.print()">Print / Simpan PDF</button>
    </div>
  </div>

  <div class="ribbon">SMK NEGERI 6 SAMARINDA</div>

</div>

<script>
  function nextSlide() {
    const data = {
      nama: document.getElementById('nama').value || '[Your Full Name]',
      alamat: document.getElementById('alamat').value || '[Your Address]',
      tanggal: document.getElementById('tanggal').value || '[Date]',
      hrd: document.getElementById('hrd').value || '[Hiring Manager\'s Full Name]',
      perusahaan: document.getElementById('perusahaan').value || '[Company Name]',
      alamatPerusahaan: document.getElementById('alamatPerusahaan').value || '[Company Address]',
      posisi: document.getElementById('posisi').value || '[Job Title]',
      jurusan: document.getElementById('jurusan').value || '[Your Field]'
    };

    if(data.tanggal!== '[Date]') {
      const tgl = new Date(data.tanggal);
      data.tanggal = tgl.toLocaleDateString('en-US', {day: 'numeric', month: 'long', year: 'numeric'});
    }

    document.getElementById('hasilSurat').innerHTML = `
      <div class="title">
        Job Application Letter for No <br>
        Experience (Fresh Graduate)
      </div>
      <div class="section">
        ${data.nama}<br>
        ${data.alamat}<br>
        ${data.tanggal}
      </div>
      <div class="section">
        ${data.hrd}<br>
        ${data.perusahaan}<br>
        ${data.alamatPerusahaan}
      </div>
      <div class="section">
        Dear ${data.hrd},
      </div>
      <div class="section">
        I am writing to express my interest in the ${data.posisi} position at ${data.perusahaan}. As a recent graduate in ${data.jurusan}, I am eager to apply my academic knowledge and skills in a professional environment.
      </div>
      <div class="section">
        During my studies, I developed strong communication skills, teamwork abilities, and a willingness to learn through coursework and projects.
      </div>
      <div class="section">
        I am highly motivated to grow, learn, and contribute positively to your organization.
      </div>
      <div class="section signature-space">
        Sincerely,
      </div>
      <div class="section">
        ${data.nama}
      </div>
    `;

    document.getElementById('slide1').classList.remove('active');
    document.getElementById('slide2').classList.add('active');
  }

  function backSlide() {
    document.getElementById('slide2').classList.remove('active');
    document.getElementById('slide1').classList.add('active');
  }
</script>

</body>
</html>
